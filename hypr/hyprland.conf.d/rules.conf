# all hyprland rules

general{
  border_size = 3
  gaps_in = 3
  gaps_out = 3
  float_gaps = 0
  gaps_workspaces = 50

  col.active_border = rgba(bbbbbbbb) rgba(cccccccc) -45deg
  col.inactive_border = rgba(88888888)

  layout = dwindle
  no_focus_fallback = true

  resize_on_border = false
  extend_border_grab_area = 5
  hover_icon_on_border = true

	allow_tearing = false
  resize_corner = 0
  modal_parent_blocking = true
  locale = en_US

  snap {
    enabled = true
    window_gap = 10
    monitor_gap = 10
    border_overlap = true
    respect_gaps = true
  }
}
decoration {
    rounding = 7
    rounding_power = 2
    
    active_opacity = 1.0
    inactive_opacity = 1.0

    dim_inactive = true
    dim_strength = 0.10
    blur {
      enabled = true
      size = 10
      passes = 1
      ignore_opacity = true
      xray = true
      noise = 0
      contrast = 0.8
      vibrancy = 0.17
    }
    shadow {
      enabled = true
      range = 4
      render_power = 3
      sharp = false
      color = 0xee1a1a1a
      color_inactive = 0xee1a1a1a
    }
}
animations:workspace_wraparound = false
input{
	$cursorSpeed = -2.0
	accel_profile = custom 1 -2.0 $cursorSpeed
  follow_mouse = 1
  mouse_refocus = 0
}
cursor {
  no_hardware_cursors = 0
  hotspot_padding = 1
  inactive_timeout = 0.5
  no_warps = false
  enable_hyprcursor = true
  hide_on_key_press = true
}
ecosystem {
  no_update_news = true
  no_donation_nag = true
  enforce_permissions = false
}
