# HarumakiGohan inspired colorscheme
[env]
TERM = "xterm-256color"

[colors.primary]
background = '#1c2743'
foreground = '#e09ded'

[colors.cursor]
text = '#fd7dfd'
cursor = '#2e60cb'

[colors.selection]
text = '#fd7dfd'
background = '#263e7b'

# Normal colors
[colors.normal]
black = '#252a62'
red = '#c483f3'
green = '#5acedf'
yellow = '#e0e08a'
blue = '#506aea'
magenta = '#c483f3'
cyan = '#6c8eff'
white = '#eae3ff'

# Bright colors
[colors.bright]
black = '#023077'
red = '#fe88ff'
green = '#9adeea'
yellow = '#fffdae'
blue = '#4881ff'
magenta = '#fe88ff'
cyan = '#9faeff'
white = '#ffffff'

# Debug missing colors
[colors]
indexed_colors = [
  {index=16,color="#ff0000"},
  {index=17,color="#00ff00"},
  {index=18,color="#0000ff"},
  {index=19,color="#ffff00"},
  {index=20,color="#00ffff"},
  {index=21,color="#ff00ff"},
  {index=22,color="#0000ff"}
]
transparent_background_colors = true

[cursor]
style={shape="block",blinking="off"}
thickness=0.2

[mouse]
hide_when_typing=true
